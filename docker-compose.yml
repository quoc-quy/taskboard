version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: todo-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=todo_db
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - todo-network

  backend:
    build:
      context: ./todo-backend
      dockerfile: Dockerfile
    container_name: todo-backend-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=todo_db
      - DB_SYNCHRONIZE=true
      - THROTTLER_TTL=60
      - THROTTLER_LIMIT=60
      - CORS_ORIGIN=http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
    networks:
      - todo-network

  frontend:
    build:
      context: ./todo-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3000/api/v1
    container_name: todo-frontend-app
    ports:
      - "3001:3001"
    environment:
      - API_URL_SERVER=http://backend:3000/api/v1
    depends_on:
      - backend
    networks:
      - todo-network

volumes:
  postgres_prod_data:

networks:
  todo-network:
    driver: bridge
