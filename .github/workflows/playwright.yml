name: Playwright Tests

on:
  push:
    branches: [main, master, refactor/cozy-taskboard-fixes]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    # Configure the working directory globally for all run steps to target the frontend subdirectory
    defaults:
      run:
        working-directory: todo-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        env:
          TEST_TARGET_URL: https://srt-taskboard-trannguyenquocquy.vercel.app
        run: pnpm exec playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: todo-frontend/playwright-report/
          retention-days: 14
